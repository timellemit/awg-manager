name: "Build"
on:
  workflow_dispatch:
  push:
    branches:
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache result
        uses: actions/cache@v4
        with:
          key: result-${{ github.sha }}
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Setup go
        uses: actions/setup-go@v4
        with:
          go-version: 1.23

      - name: Install dependencies
        run: go install golang.org/dl/go1.23.12@latest && go1.23.12 download

      - name: Build
        id: build
        run: |
          ./scripts/build-ipk.sh mipsel-3.4
          ./scripts/build-ipk.sh mips-3.4
          ./scripts/build-ipk.sh aarch64-3.10

  pre-release:
    name: Pre-release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          key: result-${{ github.sha }}
          path: dist
          fail-on-cache-miss: true

      - name: Publish pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob
          files=(./dist/awg-manager_*)

          if (( ${#files[@]} == 0 )); then
            echo "No release files found in ./dist"
            exit 1
          fi

          gh release delete latest --yes --cleanup-tag || true
          gh release create latest "${files[@]}" \
            --target "${GITHUB_SHA}" \
            --title "Development build" \
            --generate-notes \
            --prerelease
